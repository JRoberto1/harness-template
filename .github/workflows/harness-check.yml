name: Bifrost Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  harness-check:
    name: Harness Integrity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check AGENTS.md exists
        run: |
          echo "🌉 Bifrost — Verificando integridade do harness..."
          test -f AGENTS.md || (echo "❌ AGENTS.md não encontrado" && exit 1)
          echo "✓ AGENTS.md"

      - name: Check mirrors in sync
        run: |
          if ! diff -q AGENTS.md CLAUDE.md &>/dev/null; then
            echo "❌ CLAUDE.md desincronizado com AGENTS.md"
            exit 1
          fi
          echo "✓ CLAUDE.md sincronizado"
          if ! diff -q AGENTS.md GEMINI.md &>/dev/null; then
            echo "❌ GEMINI.md desincronizado com AGENTS.md"
            exit 1
          fi
          echo "✓ GEMINI.md sincronizado"

      - name: Check required files
        run: |
          FILES=(
            ".harness/index.md"
            ".harness/config.json"
            ".harness/pev/pev.md"
            "directives/session-memory.md"
            "directives/context-management.md"
            "directives/harness-evolution.md"
            "execution/compress-history.py"
          )
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ $f não encontrado"
              exit 1
            fi
            echo "✓ $f"
          done

      - name: Check no secrets in directives
        run: |
          if grep -rE "(password|api_key|secret)\s*[:=]\s*['\"][^'\"]{8,}" directives/ 2>/dev/null; then
            echo "❌ Possível credencial em directives/"
            exit 1
          fi
          echo "✓ Sem segredos em directives/"

      - name: Validate config.json
        run: |
          node -e "
            const c = require('./.harness/config.json');
            if (!c.version) throw new Error('version ausente');
            if (!c.protected_paths) throw new Error('protected_paths ausente');
            if (!c.allowed_paths) throw new Error('allowed_paths ausente');
            console.log('✓ config.json válido — v' + c.version);
          "

      - name: Summary
        run: |
          echo ""
          echo "✅ Bifrost íntegro — todos os checks passaram"
          echo "   AGENTS.md · CLAUDE.md · GEMINI.md · directives · config.json"
