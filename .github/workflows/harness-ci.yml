name: Harness Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  harness-check:
    name: Harness Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar arquivos núcleo
        run: |
          echo "Verificando estrutura do harness..."
          files=(
            "AGENTS.md"
            "docs/architecture.md"
            "docs/domain-rules.md"
            "docs/coding-standards.md"
            ".harness/pev/pev.md"
            "directives/DIRECTIVE-template.md"
            "execution/SCRIPT-template.py"
          )
          missing=0
          for f in "${files[@]}"; do
            [ -f "$f" ] && echo "✓ $f" || { echo "✗ $f AUSENTE"; missing=$((missing+1)); }
          done
          [ $missing -gt 0 ] && exit 1 || echo "Harness íntegro ✅"

      - name: Verificar segredos no código
        run: |
          echo "Verificando segredos..."
          if grep -rE "(password|api_key|secret)\s*[:=]\s*['\"][^'\"]{8,}" \
            --include="*.ts" --include="*.js" --include="*.py" \
            --exclude-dir=node_modules --exclude-dir=.git \
            | grep -v "harness-ignore" | grep -v ".env.example"; then
            echo "❌ Possível credencial encontrada no código"
            exit 1
          fi
          echo "✓ Sem segredos detectados"

      - name: Verificar 'any' em TypeScript
        run: |
          echo "Verificando TypeScript any..."
          if find . -name "*.ts" -o -name "*.tsx" \
            | grep -v node_modules | grep -v ".d.ts" \
            | xargs grep -n ": any" 2>/dev/null \
            | grep -v "harness-ignore"; then
            echo "❌ Uso de 'any' detectado — defina o tipo explícito"
            exit 1
          fi
          echo "✓ Sem 'any' detectado"

